<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TMG Contact Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #111;
}
.header h1 { font-size: 16px; font-weight: 600; }
.counter { font-size: 13px; color: #888; }

.progress-bar { height: 3px; background: #222; }
.progress-fill { height: 100%; background: #4a9eff; transition: width 0.3s; }

.card-container {
  position: relative;
  height: calc(100dvh - 39px - 3px - 72px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 8px 12px;
  overflow: hidden;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #1a1a1a;
  border-radius: 14px;
  border: 1px solid #333;
  overflow-y: auto;
  max-height: 100%;
  transition: transform 0.2s ease, opacity 0.2s ease;
}
.card.out { transform: scale(0.92); opacity: 0; }

.card-top {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #2a2a2a;
}
.card-top h2 { font-size: 20px; font-weight: 700; line-height: 1.2; }
.card-top .meta { font-size: 13px; color: #888; margin-top: 2px; }
.card-top .meta .company { color: #4a9eff; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
}
.badge.current_client { background: #0d52; color: #0d5; border: 1px solid #0d5; }
.badge.past_client    { background: #fa02; color: #fa0; border: 1px solid #fa0; }
.badge.warm_lead      { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }
.badge.cold_lead      { background: #88888822; color: #888; border: 1px solid #555; }
.badge.referral       { background: #a855f722; color: #a855f7; border: 1px solid #a855f7; }
.badge.internal       { background: #66666622; color: #666; border: 1px solid #444; }
.badge.prospect       { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }

.card-info {
  padding: 8px 16px 6px;
  border-bottom: 1px solid #2a2a2a;
}
.card-info a { color: #4a9eff; text-decoration: none; }
.info-row {
  display: flex;
  align-items: flex-start;
  padding: 3px 0;
  font-size: 13px;
}
.info-label { color: #666; width: 70px; flex-shrink: 0; }
.info-value { color: #ccc; word-break: break-all; }
.data-dots {
  font-size: 11px;
  padding: 4px 0 6px;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 4px;
}

.intel {
  padding: 10px 16px 14px;
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
}

.actions {
  display: flex;
  align-items: center;
  padding: 12px 10px;
  background: #111;
  border-top: 1px solid #222;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 72px;
  gap: 8px;
}

.action-btn {
  flex: 1;
  height: 46px;
  border-radius: 10px;
  border: 2px solid;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  text-transform: uppercase;
}
.action-btn:active { opacity: 0.6; transform: scale(0.95); }
.btn-no         { border-color: #f44;    color: #f44; }
.btn-evangelist { border-color: #fa0;    color: #fa0; }
.btn-prospect   { border-color: #a855f7; color: #a855f7; }
.btn-client     { border-color: #0d5;    color: #0d5; }

.undo-bar {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a2a2a;
  color: #fff;
  padding: 9px 22px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 50;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  border: 1px solid #444;
}
.undo-bar.show { display: block; animation: fadeUp 0.2s ease; }
.undo-bar span { color: #4a9eff; font-weight: 600; margin-left: 6px; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.center-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding: 40px;
  color: #555;
}
.center-state h2 { color: #888; margin-bottom: 8px; font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>TMG Review</h1>
  <div class="counter" id="counter"></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card-container" id="card-container">
  <div class="center-state"><h2>Loading…</h2></div>
</div>

<div class="actions">
  <button class="action-btn btn-no"         onclick="handleAction('no')">No</button>
  <button class="action-btn btn-evangelist" onclick="handleAction('evangelist')">Evang.</button>
  <button class="action-btn btn-prospect"   onclick="handleAction('prospect')">Prospect</button>
  <button class="action-btn btn-client"     onclick="handleAction('client')">Client</button>
</div>

<div class="undo-bar" id="undo-bar" onclick="undoAction()">Undo<span id="undo-name"></span></div>

<script>
const SUPABASE_URL = 'https://eacyaqvkfexqbauitczm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY3lhcXZrZmV4cWJhdWl0Y3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjgwMzYsImV4cCI6MjA4OTM0NDAzNn0.oKCyrqMi8W7_59yM7TO1NxNU7ek0YaPtNf2_gDIFpnY';

let db;
let contacts = [];
let currentIndex = 0;
let lastAction = null;
let total = 0;

async function init() {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadContacts();
}

async function loadContacts() {
  try {
    const { data: reviewed } = await db
      .from('review_actions')
      .select('contact_id');
    const reviewedIds = new Set((reviewed || []).map(r => r.contact_id));

    let allData = [];
    let from = 0;
    const batchSize = 1000;
    let hasMore = true;

    while (hasMore) {
      const { data, error } = await db
        .from('contacts')
        .select(`
          id, first_name, last_name, email, phone, mobile_phone, business_phone,
          company, employer, job_title, nominator, linkedin_url, contact_owner,
          client_status, client_years_active, client_last_invoiced,
          contact_intel (
            narrative, relationship_status, last_interaction
          )
        `)
        .not('contact_owner', 'ilike', '%Bruckner%')
        .order('id', { ascending: true })
        .range(from, from + batchSize - 1);

      if (error) { showError(error.message); return; }

      const filtered = (data || []).filter(c => c.id && !reviewedIds.has(c.id));
      allData = allData.concat(filtered);
      if (!data || data.length < batchSize) hasMore = false;
      else from += batchSize;
    }

    allData.sort((a, b) => {
      const la = (a.last_name  || '').toLowerCase();
      const lb = (b.last_name  || '').toLowerCase();
      if (la < lb) return -1; if (la > lb) return 1;
      const fa = (a.first_name || '').toLowerCase();
      const fb = (b.first_name || '').toLowerCase();
      return fa < fb ? -1 : fa > fb ? 1 : 0;
    });

    contacts = allData.filter(c => {
      const first = (c.first_name || '').trim();
      const last  = (c.last_name  || '').trim();
      if (!first && !last) return false;
      if (/^\d{7,}$/.test(last.replace(/\D/g, ''))) return false;
      return true;
    });

    total = contacts.length;
    currentIndex = 0;
    renderCard();
  } catch (err) {
    showError(err.message);
  }
}

function renderCard() {
  const container = document.getElementById('card-container');

  if (contacts.length === 0 || currentIndex >= contacts.length) {
    document.getElementById('counter').textContent = '';
    document.getElementById('progress').style.width = '100%';
    container.innerHTML = '<div class="center-state"><h2>All done!</h2><p>No more contacts to review.</p></div>';
    return;
  }

  const reviewed = total - contacts.length + currentIndex;
  document.getElementById('counter').textContent = (currentIndex + 1) + ' of ' + contacts.length + ' remaining';
  document.getElementById('progress').style.width = (total > 0 ? (reviewed / total) * 100 : 0) + '%';

  const c = contacts[currentIndex];
  const intel = c.contact_intel
    ? (Array.isArray(c.contact_intel) ? c.contact_intel[0] : c.contact_intel)
    : null;
  const phone   = c.mobile_phone || c.phone || c.business_phone || '';
  const company = c.company || c.employer || '';

  let badgeClass = '', badgeText = '';
  if (c.client_status === 'current_client') {
    badgeText  = 'Client' + (c.client_years_active ? ' · ' + c.client_years_active + ' yrs' : '');
    badgeClass = 'current_client';
  } else if (c.client_status === 'past_client') {
    badgeText  = 'Past Client' + (c.client_last_invoiced ? ' · last ' + c.client_last_invoiced : '');
    badgeClass = 'past_client';
  } else if (intel && intel.relationship_status) {
    badgeText = intel.relationship_status.replace(/_/g, ' ');
    const rs = intel.relationship_status;
    if      (rs === 'active_client')   badgeClass = 'current_client';
    else if (rs === 'warm_lead')       badgeClass = 'warm_lead';
    else if (rs === 'cold_lead')       badgeClass = 'cold_lead';
    else if (rs === 'referral_source') badgeClass = 'referral';
    else if (rs === 'internal')        badgeClass = 'internal';
    else if (rs === 'unknown')         badgeClass = 'cold_lead';
    else                               badgeClass = 'prospect';
  }

  let metaParts = [];
  if (company)     metaParts.push('<span class="company">' + esc(company) + '</span>');
  if (c.job_title) metaParts.push(esc(c.job_title));

  let dots = '';
  dots += '<span style="color:' + (c.email        ? '#0d5' : '#333') + '">Email</span> · ';
  dots += '<span style="color:' + (phone          ? '#0d5' : '#333') + '">Phone</span> · ';
  dots += '<span style="color:' + (c.linkedin_url ? '#0d5' : '#333') + '">LinkedIn</span> · ';
  dots += '<span style="color:' + (intel && intel.narrative ? '#0d5' : '#333') + '">Intel</span>';

  let infoRows = '';
  if (c.email)        infoRows += row('Email',    '<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>');
  if (phone)          infoRows += row('Phone',    '<a href="tel:' + esc(phone) + '">' + esc(phone) + '</a>');
  if (c.linkedin_url) infoRows += row('LinkedIn', '<a href="' + esc(c.linkedin_url) + '" target="_blank">Profile</a>');
  if (c.nominator)    infoRows += row('Referred',  esc(c.nominator));
  if (intel && intel.last_interaction) infoRows += row('Last', esc(intel.last_interaction));

  container.innerHTML = `
    <div class="card" id="active-card">
      <div class="card-top">
        <h2>${esc(c.first_name || '')} ${esc(c.last_name || '')}</h2>
        ${metaParts.length ? '<div class="meta">' + metaParts.join(' · ') + '</div>' : ''}
        ${badgeText ? '<div class="badge ' + badgeClass + '">' + esc(badgeText) + '</div>' : ''}
      </div>
      <div class="card-info">
        <div class="data-dots">${dots}</div>
        ${infoRows}
      </div>
      <div class="intel">${intel && intel.narrative ? fmt(intel.narrative) : '<span style="color:#555">No intel available</span>'}</div>
    </div>`;
}

function row(label, value) {
  return '<div class="info-row"><div class="info-label">' + label + '</div><div class="info-value">' + value + '</div></div>';
}
function fmt(text) { return esc(text).replace(/\n/g, '<br>'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showError(msg) {
  document.getElementById('card-container').innerHTML = '<div class="center-state"><h2>Error</h2><p>' + msg + '</p></div>';
}

async function handleAction(action) {
  if (currentIndex >= contacts.length) return;
  const c = contacts[currentIndex];

  const card = document.getElementById('active-card');
  if (card) card.classList.add('out');

  await db.from('review_actions').insert({
    contact_id: c.id,
    action,
    note: null,
    reviewed_at: new Date().toISOString()
  });

  lastAction = {
    contactId: c.id,
    action,
    index: currentIndex,
    name: ((c.first_name || '') + ' ' + (c.last_name || '')).trim()
  };

  setTimeout(() => {
    currentIndex++;
    renderCard();
    const undo = document.getElementById('undo-bar');
    document.getElementById('undo-name').textContent = ' ' + lastAction.name;
    undo.classList.add('show');
    clearTimeout(window._undoTimer);
    window._undoTimer = setTimeout(() => undo.classList.remove('show'), 5000);
  }, 200);
}

async function undoAction() {
  if (!lastAction) return;

  await db.from('review_actions')
    .delete()
    .eq('contact_id', lastAction.contactId)
    .eq('action', lastAction.action);

  currentIndex = lastAction.index;
  lastAction = null;
  document.getElementById('undo-bar').classList.remove('show');
  renderCard();
}

init();
</script>
</body>
</html>
