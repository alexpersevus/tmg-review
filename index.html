<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TMG Contact Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
  touch-action: none;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: #111;
  border-bottom: 1px solid #222;
}
.header h1 { font-size: 18px; font-weight: 600; }
.counter { font-size: 14px; color: #888; }

.card-container {
  position: relative;
  height: calc(100dvh - 56px - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #1a1a1a;
  border-radius: 16px;
  border: 1px solid #333;
  overflow-y: auto;
  max-height: 100%;
  position: relative;
  transition: transform 0.3s ease, opacity 0.3s ease;
  touch-action: none;
}
.card.swiping { transition: none; }
.card.swipe-right { transform: translateX(150%) rotate(15deg); opacity: 0; }
.card.swipe-left { transform: translateX(-150%) rotate(-15deg); opacity: 0; }
.card.swipe-up { transform: translateY(-150%); opacity: 0; }

.swipe-indicator {
  position: absolute;
  top: 20px;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 20px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
  pointer-events: none;
}
.swipe-indicator.right { right: 20px; background: #0d5; color: #000; }
.swipe-indicator.left { left: 20px; background: #f44; color: #fff; }
.swipe-indicator.up { left: 50%; transform: translateX(-50%); background: #fa0; color: #000; }

.card-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid #2a2a2a;
}
.card-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.card-header .company { font-size: 16px; color: #4a9eff; }
.card-header .title { font-size: 14px; color: #888; margin-top: 2px; }

.client-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 8px;
}
.client-badge.current_client { background: #0d52; color: #0d5; border: 1px solid #0d5; }
.client-badge.past_client { background: #fa02; color: #fa0; border: 1px solid #fa0; }
.client-badge.prospect { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }

.card-body { padding: 16px 20px; }

.info-row {
  display: flex;
  align-items: flex-start;
  padding: 6px 0;
  font-size: 14px;
}
.info-label { color: #666; width: 80px; flex-shrink: 0; }
.info-value { color: #ccc; word-break: break-all; }
.info-value a { color: #4a9eff; text-decoration: none; }

.narrative-section {
  margin-top: 12px;
  padding: 12px;
  background: #111;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
}
.narrative-section h3 {
  font-size: 13px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.narrative-text {
  font-size: 14px;
  line-height: 1.5;
  color: #bbb;
}

.note-section {
  margin-top: 12px;
  padding: 12px;
  background: #0a1a0a;
  border-radius: 10px;
  border: 1px solid #1a3a1a;
}
.note-section h3 {
  font-size: 13px;
  color: #0d5;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.note-input {
  width: 100%;
  min-height: 60px;
  background: #111;
  border: 1px solid #333;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  padding: 10px;
  resize: vertical;
  font-family: inherit;
}
.note-input::placeholder { color: #555; }

.actions {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 12px 16px;
  background: #111;
  border-top: 1px solid #222;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
}

.action-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid;
  background: transparent;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { transform: scale(0.9); }
.btn-remove { border-color: #f44; color: #f44; }
.btn-remove:active { background: #f442; }
.btn-edit { border-color: #fa0; color: #fa0; }
.btn-edit:active { background: #fa02; }
.btn-confirm { border-color: #0d5; color: #0d5; }
.btn-confirm:active { background: #0d52; }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: calc(100dvh - 56px - 80px);
  color: #666;
  font-size: 16px;
}

.empty-state {
  text-align: center;
  padding: 40px;
}
.empty-state h2 { margin-bottom: 8px; }
.empty-state p { color: #888; }

.filter-bar {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  background: #111;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #333;
  background: transparent;
  color: #888;
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.filter-btn.active { background: #4a9eff22; color: #4a9eff; border-color: #4a9eff; }

.stats-bar {
  display: flex;
  gap: 16px;
  padding: 6px 16px;
  background: #0a0a0a;
  font-size: 12px;
  color: #555;
  border-bottom: 1px solid #1a1a1a;
}
.stat-item span { color: #888; }
</style>
</head>
<body>

<div class="header">
  <h1>TMG Review</h1>
  <div class="counter" id="counter">Loading...</div>
</div>

<div class="filter-bar" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="has_narrative">Has Intel</button>
  <button class="filter-btn" data-filter="current_client">Clients</button>
  <button class="filter-btn" data-filter="past_client">Past Clients</button>
  <button class="filter-btn" data-filter="unknown">Unreviewed</button>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item">Confirmed: <span id="stat-confirmed">0</span></div>
  <div class="stat-item">Removed: <span id="stat-removed">0</span></div>
  <div class="stat-item">Flagged: <span id="stat-flagged">0</span></div>
</div>

<div class="card-container" id="card-container">
  <div class="loading" id="loading">Loading contacts...</div>
</div>

<div class="actions">
  <button class="action-btn btn-remove" onclick="handleAction('remove')" title="Remove">&#10005;</button>
  <button class="action-btn btn-edit" onclick="handleAction('flag')" title="Needs Update">&#9888;</button>
  <button class="action-btn btn-confirm" onclick="handleAction('confirm')" title="Confirmed">&#10003;</button>
</div>

<script>
const SUPABASE_URL = 'https://eacyaqvkfexqbauitczm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY3lhcXZrZmV4cWJhdWl0Y3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjgwMzYsImV4cCI6MjA4OTM0NDAzNn0.oKCyrqMi8W7_59yM7TO1NxNU7ek0YaPtNf2_gDIFpnY';

let db;
let contacts = [];
let currentIndex = 0;
let currentFilter = 'all';
let sessionStats = { confirmed: 0, removed: 0, flagged: 0 };

async function init() {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Create review_actions table if needed (will fail silently if exists)
  await loadContacts();
  setupSwipeGestures();
  setupFilterButtons();
}

async function loadContacts() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').textContent = 'Loading contacts...';

  try {
    // Load in batches of 1000 (Supabase default limit)
    let allData = [];
    let from = 0;
    const batchSize = 1000;
    let hasMore = true;

    while (hasMore) {
      const { data, error } = await db
        .from('contact_intel')
        .select(`
          narrative, relationship_status, email_count, meeting_count, last_interaction,
          contacts (
            id, first_name, last_name, nickname, email, phone, mobile_phone, business_phone,
            company, employer, job_title, nominator, linkedin_url,
            business_address, city, state, date_of_birth, gender, marital_status, spouse_name,
            lifecycle_stage, lead_status, notes,
            client_status, client_company_match, client_first_invoiced, client_last_invoiced, client_years_active
          )
        `)
        .not('narrative', 'is', null)
        .order('last_interaction', { ascending: false, nullsFirst: false })
        .range(from, from + batchSize - 1);

      if (error) {
        const errEl = document.getElementById('loading');
        if (errEl) errEl.textContent = 'Error: ' + error.message;
        return;
      }

      // Reshape: move contact fields to top level, intel as nested
      const reshaped = (data || []).map(row => {
        const c = row.contacts || {};
        c.contact_intel = {
          narrative: row.narrative,
          relationship_status: row.relationship_status,
          email_count: row.email_count,
          meeting_count: row.meeting_count,
          last_interaction: row.last_interaction
        };
        return c;
      }).filter(c => c.id);
      allData = allData.concat(reshaped);
      const loadEl = document.getElementById('loading');
      if (loadEl) loadEl.textContent = 'Loaded ' + allData.length + ' contacts...';

      if (!data || data.length < batchSize) {
        hasMore = false;
      } else {
        from += batchSize;
      }
    }

    // Filter out junk contacts (phone numbers as names, no real name, etc.)
    contacts = allData.filter(c => {
      const first = (c.first_name || '').trim();
      const last = (c.last_name || '').trim();
      // Skip if no name at all
      if (!first && !last) return false;
      // Skip if last name is just a phone number
      if (/^\d{7,}$/.test(last.replace(/\D/g, ''))) return false;
      // Skip if name is just a single character
      if (first.length <= 1 && last.length <= 1) return false;
      return true;
    });
    applyFilter();
  } catch (err) {
    const errEl2 = document.getElementById('loading');
    if (errEl2) errEl2.textContent = 'Error: ' + err.message;
  }
}

function applyFilter() {
  let filtered;
  switch (currentFilter) {
    case 'has_narrative':
      filtered = contacts.filter(c => {
        const ci = c.contact_intel;
        if (!ci) return false;
        const intel = Array.isArray(ci) ? ci[0] : ci;
        return intel && intel.narrative;
      });
      break;
    case 'current_client':
      filtered = contacts.filter(c => c.client_status === 'current_client');
      break;
    case 'past_client':
      filtered = contacts.filter(c => c.client_status === 'past_client');
      break;
    case 'unknown':
      filtered = contacts.filter(c => {
        const ci = c.contact_intel;
        if (!ci) return true;
        const intel = Array.isArray(ci) ? ci[0] : ci;
        return !intel || intel.relationship_status === 'unknown';
      });
      break;
    default:
      filtered = contacts;
  }

  contacts._filtered = filtered;
  currentIndex = 0;
  renderCard();
}

function setupFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilter();
    });
  });
}

function renderCard() {
  const container = document.getElementById('card-container');
  const filtered = contacts._filtered || contacts;

  document.getElementById('counter').textContent =
    (currentIndex + 1) + ' / ' + filtered.length;

  document.getElementById('stat-confirmed').textContent = sessionStats.confirmed;
  document.getElementById('stat-removed').textContent = sessionStats.removed;
  document.getElementById('stat-flagged').textContent = sessionStats.flagged;

  if (filtered.length === 0 || currentIndex >= filtered.length) {
    container.innerHTML = '<div class="empty-state"><h2>All done!</h2><p>No more contacts to review in this filter.</p></div>';
    return;
  }

  const c = filtered[currentIndex];
  const intel = c.contact_intel ? (Array.isArray(c.contact_intel) ? c.contact_intel[0] : c.contact_intel) : null;
  const phone = c.mobile_phone || c.phone || c.business_phone || '';
  const company = c.company || c.employer || '';

  let badgeClass = c.client_status || 'prospect';
  let badgeText = '';
  if (c.client_status === 'current_client') {
    badgeText = 'Client' + (c.client_years_active ? ' · ' + c.client_years_active + ' yrs' : '');
  } else if (c.client_status === 'past_client') {
    badgeText = 'Past Client' + (c.client_last_invoiced ? ' · last ' + c.client_last_invoiced : '');
  } else if (intel && intel.relationship_status && intel.relationship_status !== 'unknown') {
    badgeText = intel.relationship_status.replace(/_/g, ' ');
    badgeClass = 'prospect';
  }

  let html = `
    <div class="card" id="active-card">
      <div class="swipe-indicator right" id="ind-right">CONFIRM</div>
      <div class="swipe-indicator left" id="ind-left">REMOVE</div>
      <div class="swipe-indicator up" id="ind-up">FLAG</div>

      <div class="card-header">
        <h2>${esc(c.first_name || '')} ${esc(c.last_name || '')}</h2>
        ${company ? '<div class="company">' + esc(company) + '</div>' : ''}
        ${c.job_title ? '<div class="title">' + esc(c.job_title) + '</div>' : ''}
        ${badgeText ? '<div class="client-badge ' + badgeClass + '">' + esc(badgeText) + '</div>' : ''}
      </div>

      <div class="card-body">`;

  // Data completeness dots
  let dots = '';
  dots += '<span style="color:' + (c.email ? '#0d5' : '#333') + '">Email</span> · ';
  dots += '<span style="color:' + (phone ? '#0d5' : '#333') + '">Phone</span> · ';
  dots += '<span style="color:' + (c.linkedin_url ? '#0d5' : '#333') + '">LinkedIn</span> · ';
  dots += '<span style="color:' + (intel && intel.narrative ? '#0d5' : '#333') + '">Intel</span>';
  html += '<div style="font-size:11px;padding:4px 0 8px;border-bottom:1px solid #2a2a2a;margin-bottom:8px">' + dots + '</div>';

  if (c.nickname) html += infoRow('Nickname', esc(c.nickname));
  if (c.email) html += infoRow('Email', '<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>');
  if (phone) html += infoRow('Phone', '<a href="tel:' + esc(phone) + '">' + esc(phone) + '</a>');
  if (c.linkedin_url) html += infoRow('LinkedIn', '<a href="' + esc(c.linkedin_url) + '" target="_blank">Profile</a>');
  if (c.business_address) html += infoRow('Address', esc(c.business_address));
  if (c.nominator) html += infoRow('Referred', esc(c.nominator));
  if (c.date_of_birth) html += infoRow('Birthday', esc(c.date_of_birth));
  if (c.spouse_name) html += infoRow('Spouse', esc(c.spouse_name));
  if (c.marital_status) html += infoRow('Status', esc(c.marital_status));
  if (c.notes) html += infoRow('Notes', esc(c.notes.substring(0, 200)) + (c.notes.length > 200 ? '...' : ''));
  if (intel && intel.last_interaction) html += infoRow('Last Touch', esc(intel.last_interaction));
  if (intel && intel.email_count) html += infoRow('Emails', esc(String(intel.email_count)));

  if (intel && intel.narrative) {
    html += `
        <div class="narrative-section">
          <h3>Intel Brief</h3>
          <div class="narrative-text">${formatNarrative(intel.narrative)}</div>
        </div>`;
  }

  html += `
        <div class="note-section">
          <h3>Voice Note / Comment</h3>
          <textarea class="note-input" id="note-input" placeholder="Tap here and use dictation to add notes..."></textarea>
        </div>
      </div>
    </div>`;

  container.innerHTML = html;
  const loadEl2 = document.getElementById('loading');
  if (loadEl2) loadEl2.style.display = 'none';
  setupSwipeGestures();
}

function infoRow(label, value) {
  return '<div class="info-row"><div class="info-label">' + label + '</div><div class="info-value">' + value + '</div></div>';
}

function formatNarrative(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n- /g, '<br>• ')
    .replace(/\n/g, '<br>');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Swipe Gestures ---
let startX, startY, isDragging = false;

function setupSwipeGestures() {
  const card = document.getElementById('active-card');
  if (!card) return;

  card.addEventListener('touchstart', onTouchStart, { passive: true });
  card.addEventListener('touchmove', onTouchMove, { passive: false });
  card.addEventListener('touchend', onTouchEnd);
  card.addEventListener('mousedown', onMouseDown);
}

function onTouchStart(e) {
  // Don't start swipe if touching the textarea
  if (e.target.closest('.note-input')) return;
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
  isDragging = true;
  const card = document.getElementById('active-card');
  if (card) card.classList.add('swiping');
}

function onTouchMove(e) {
  if (!isDragging) return;
  if (e.target.closest('.note-input')) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;
  updateCardPosition(dx, dy);
}

function onTouchEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  const card = document.getElementById('active-card');
  if (!card) return;
  card.classList.remove('swiping');

  const t = e.changedTouches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;

  if (dx > 100) handleAction('confirm');
  else if (dx < -100) handleAction('remove');
  else if (dy < -100) handleAction('flag');
  else {
    card.style.transform = '';
    hideIndicators();
  }
}

function onMouseDown(e) {
  if (e.target.closest('.note-input')) return;
  startX = e.clientX;
  startY = e.clientY;
  isDragging = true;
  const card = document.getElementById('active-card');
  if (card) card.classList.add('swiping');

  const onMove = (ev) => {
    if (!isDragging) return;
    updateCardPosition(ev.clientX - startX, ev.clientY - startY);
  };
  const onUp = (ev) => {
    isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const card = document.getElementById('active-card');
    if (!card) return;
    card.classList.remove('swiping');
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    if (dx > 100) handleAction('confirm');
    else if (dx < -100) handleAction('remove');
    else if (dy < -100) handleAction('flag');
    else {
      card.style.transform = '';
      hideIndicators();
    }
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function updateCardPosition(dx, dy) {
  const card = document.getElementById('active-card');
  if (!card) return;

  const rot = dx * 0.05;
  card.style.transform = 'translateX(' + dx + 'px) translateY(' + Math.min(dy, 0) + 'px) rotate(' + rot + 'deg)';

  const indRight = document.getElementById('ind-right');
  const indLeft = document.getElementById('ind-left');
  const indUp = document.getElementById('ind-up');

  if (indRight) indRight.style.opacity = Math.max(0, Math.min(1, dx / 100));
  if (indLeft) indLeft.style.opacity = Math.max(0, Math.min(1, -dx / 100));
  if (indUp) indUp.style.opacity = Math.max(0, Math.min(1, -dy / 100));
}

function hideIndicators() {
  ['ind-right', 'ind-left', 'ind-up'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = 0;
  });
}

// --- Actions ---
async function handleAction(action) {
  const filtered = contacts._filtered || contacts;
  if (currentIndex >= filtered.length) return;

  const c = filtered[currentIndex];
  const note = (document.getElementById('note-input') || {}).value || '';

  const card = document.getElementById('active-card');
  if (card) {
    card.classList.remove('swiping');
    if (action === 'confirm') card.classList.add('swipe-right');
    else if (action === 'remove') card.classList.add('swipe-left');
    else card.classList.add('swipe-up');
  }

  // Save review action
  await db.from('review_actions').insert({
    contact_id: c.id,
    action: action,
    note: note || null,
    reviewed_at: new Date().toISOString()
  });

  // Update stats
  if (action === 'confirm') sessionStats.confirmed++;
  else if (action === 'remove') sessionStats.removed++;
  else sessionStats.flagged++;

  // Next card after animation
  setTimeout(() => {
    currentIndex++;
    renderCard();
  }, 300);
}

// --- Init ---
init();
</script>
</body>
</html>
