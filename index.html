<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TMG One Card</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #111;
}
.header h1 { font-size: 16px; font-weight: 600; }
.counter { font-size: 13px; color: #888; }

.progress-bar { height: 3px; background: #222; }
.progress-fill { height: 100%; background: #4a9eff; transition: width 0.3s; }

.card-container {
  position: relative;
  height: calc(100dvh - 39px - 3px - 72px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 8px 12px;
  overflow: hidden;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #1a1a1a;
  border-radius: 14px;
  border: 1px solid #333;
  overflow-y: auto;
  max-height: 100%;
  transition: transform 0.3s ease, opacity 0.3s ease;
  position: relative;
}
.card.out-left  { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
.card.out-right { transform: translateX(120%) rotate(8deg); opacity: 0; }

.card-top {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #2a2a2a;
}
.card-top h2 { font-size: 20px; font-weight: 700; line-height: 1.2; }
.card-top .meta { font-size: 13px; color: #888; margin-top: 2px; }
.card-top .meta .company { color: #4a9eff; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
}
.badge.prospect   { background: #a855f722; color: #a855f7; border: 1px solid #a855f7; }
.badge.evangelist { background: #fa02; color: #fa0; border: 1px solid #fa0; }
.badge.client     { background: #0d52; color: #0d5; border: 1px solid #0d5; }
.badge.flag       { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }

.card-info {
  padding: 8px 16px 6px;
  border-bottom: 1px solid #2a2a2a;
}
.card-info a { color: #4a9eff; text-decoration: none; }
.info-row {
  display: flex;
  align-items: flex-start;
  padding: 3px 0;
  font-size: 13px;
}
.info-label { color: #666; width: 70px; flex-shrink: 0; }
.info-value { color: #ccc; word-break: break-all; }
.data-dots {
  font-size: 11px;
  padding: 4px 0 6px;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 4px;
}

.intel {
  padding: 10px 16px 14px;
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
}

.actions {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: #111;
  border-top: 1px solid #222;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 72px;
  gap: 12px;
}

.action-btn {
  flex: 1;
  height: 46px;
  border-radius: 10px;
  border: 2px solid;
  background: transparent;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  text-transform: uppercase;
}
.action-btn:active { opacity: 0.6; transform: scale(0.95); }
.btn-pass     { border-color: #f44; color: #f44; }
.btn-onecard  { border-color: #0d5; color: #0d5; }

.undo-bar {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a2a2a;
  color: #fff;
  padding: 9px 22px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 50;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  border: 1px solid #444;
}
.undo-bar.show { display: block; animation: fadeUp 0.2s ease; }
.undo-bar span { color: #4a9eff; font-weight: 600; margin-left: 6px; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.center-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding: 40px;
  color: #555;
}
.center-state h2 { color: #888; margin-bottom: 8px; font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>One Card</h1>
  <div class="counter" id="counter"></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card-container" id="card-container">
  <div class="center-state"><h2>Loading…</h2></div>
</div>

<div class="actions">
  <button class="action-btn btn-pass"    onclick="handleAction('pass')">Pass</button>
  <button class="action-btn btn-onecard" onclick="handleAction('one_card')">One Card</button>
</div>

<div class="undo-bar" id="undo-bar" onclick="undoAction()">Undo<span id="undo-name"></span></div>

<script>
const SUPABASE_URL = 'https://eacyaqvkfexqbauitczm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY3lhcXZrZmV4cWJhdWl0Y3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjgwMzYsImV4cCI6MjA4OTM0NDAzNn0.oKCyrqMi8W7_59yM7TO1NxNU7ek0YaPtNf2_gDIFpnY';

const KEPT_ACTIONS = new Set(['prospect', 'evangelist', 'client', 'flag']);

let db;
let contacts = [];
let currentIndex = 0;
let lastAction = null;
let total = 0;

async function init() {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadContacts();
}

async function loadContacts() {
  try {
    // 1. Load all round-1 review actions
    let allReviews = [];
    let rFrom = 0;
    while (true) {
      const { data } = await db
        .from('review_actions')
        .select('contact_id, action, reviewed_at')
        .range(rFrom, rFrom + 999);
      if (data && data.length > 0) allReviews = allReviews.concat(data);
      if (!data || data.length < 1000) break;
      rFrom += 1000;
    }

    // Build map: contact_id → most recent action
    const latestAction = {};
    for (const r of allReviews) {
      if (!latestAction[r.contact_id] || r.reviewed_at > latestAction[r.contact_id].reviewed_at) {
        latestAction[r.contact_id] = r;
      }
    }

    // Get kept contact IDs (prospect, evangelist, client, flag)
    const keptIds = new Map();
    for (const [cid, review] of Object.entries(latestAction)) {
      if (KEPT_ACTIONS.has(review.action)) {
        keptIds.set(Number(cid), review.action);
      }
    }

    // 2. Load already-reviewed onecard IDs
    let onecardDone = new Set();
    let oFrom = 0;
    while (true) {
      const { data } = await db
        .from('onecard_review')
        .select('contact_id')
        .range(oFrom, oFrom + 999);
      if (data && data.length > 0) data.forEach(r => onecardDone.add(r.contact_id));
      if (!data || data.length < 1000) break;
      oFrom += 1000;
    }

    // 3. Load contact details for kept IDs that haven't been onecard-reviewed yet
    const needIds = [...keptIds.keys()].filter(id => !onecardDone.has(id));

    let allData = [];
    // Fetch in batches using .in() filter
    const batchSize = 100;
    for (let i = 0; i < needIds.length; i += batchSize) {
      const batch = needIds.slice(i, i + batchSize);
      const { data, error } = await db
        .from('contacts')
        .select(`
          id, first_name, last_name, email, phone, mobile_phone, business_phone,
          company, employer, job_title, nominator, linkedin_url, contact_owner,
          contact_intel (
            narrative, relationship_status, last_interaction
          )
        `)
        .in('id', batch);

      if (error) { showError(error.message); return; }
      if (data) allData = allData.concat(data);
    }

    // Attach round-1 category to each contact
    allData.forEach(c => { c._category = keptIds.get(c.id) || ''; });

    // Sort alphabetically by last name
    allData.sort((a, b) => {
      const la = (a.last_name  || '').toLowerCase();
      const lb = (b.last_name  || '').toLowerCase();
      if (la < lb) return -1; if (la > lb) return 1;
      const fa = (a.first_name || '').toLowerCase();
      const fb = (b.first_name || '').toLowerCase();
      return fa < fb ? -1 : fa > fb ? 1 : 0;
    });

    contacts = allData;
    total = contacts.length;
    currentIndex = 0;
    renderCard();
  } catch (err) {
    showError(err.message);
  }
}

function renderCard() {
  const container = document.getElementById('card-container');

  if (contacts.length === 0 || currentIndex >= contacts.length) {
    document.getElementById('counter').textContent = '';
    document.getElementById('progress').style.width = '100%';
    container.innerHTML = '<div class="center-state"><h2>All done!</h2><p>No more contacts to review.</p></div>';
    return;
  }

  const reviewed = total - contacts.length + currentIndex;
  document.getElementById('counter').textContent = (currentIndex + 1) + ' of ' + contacts.length + ' remaining';
  document.getElementById('progress').style.width = (total > 0 ? (reviewed / total) * 100 : 0) + '%';

  const c = contacts[currentIndex];
  const intel = c.contact_intel
    ? (Array.isArray(c.contact_intel) ? c.contact_intel[0] : c.contact_intel)
    : null;
  const phone   = c.mobile_phone || c.phone || c.business_phone || '';
  const company = c.company || c.employer || '';

  // Show round-1 category as badge
  const cat = c._category;
  let badgeClass = cat;
  let badgeText = cat.charAt(0).toUpperCase() + cat.slice(1);

  let metaParts = [];
  if (company)     metaParts.push('<span class="company">' + esc(company) + '</span>');
  if (c.job_title) metaParts.push(esc(c.job_title));

  let dots = '';
  dots += '<span style="color:' + (c.email        ? '#0d5' : '#333') + '">Email</span> · ';
  dots += '<span style="color:' + (phone          ? '#0d5' : '#333') + '">Phone</span> · ';
  dots += '<span style="color:' + (c.linkedin_url ? '#0d5' : '#333') + '">LinkedIn</span> · ';
  dots += '<span style="color:' + (intel && intel.narrative ? '#0d5' : '#333') + '">Intel</span>';

  let infoRows = '';
  if (c.email)        infoRows += row('Email',    '<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>');
  if (phone)          infoRows += row('Phone',    '<a href="tel:' + esc(phone) + '">' + esc(phone) + '</a>');
  if (c.linkedin_url) infoRows += row('LinkedIn', '<a href="' + esc(c.linkedin_url) + '" target="_blank">Profile</a>');
  if (c.nominator)    infoRows += row('Referred',  esc(c.nominator));
  if (intel && intel.last_interaction) infoRows += row('Last', esc(intel.last_interaction));

  container.innerHTML = `
    <div class="card" id="active-card">
      <div class="card-top">
        <h2>${esc(c.first_name || '')} ${esc(c.last_name || '')}</h2>
        ${metaParts.length ? '<div class="meta">' + metaParts.join(' · ') + '</div>' : ''}
        ${badgeText ? '<div class="badge ' + badgeClass + '">' + esc(badgeText) + '</div>' : ''}
      </div>
      <div class="card-info">
        <div class="data-dots">${dots}</div>
        ${infoRows}
      </div>
      <div class="intel">${intel && intel.narrative ? fmt(intel.narrative) : '<span style="color:#555">No intel available</span>'}</div>
    </div>`;
}

function row(label, value) {
  return '<div class="info-row"><div class="info-label">' + label + '</div><div class="info-value">' + value + '</div></div>';
}
function fmt(text) { return esc(text).replace(/\n/g, '<br>'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showError(msg) {
  document.getElementById('card-container').innerHTML = '<div class="center-state"><h2>Error</h2><p>' + msg + '</p></div>';
}

async function handleAction(action) {
  if (currentIndex >= contacts.length) return;
  const c = contacts[currentIndex];

  const card = document.getElementById('active-card');
  if (card) card.classList.add(action === 'one_card' ? 'out-right' : 'out-left');

  await db.from('onecard_review').insert({
    contact_id: c.id,
    action,
    reviewed_at: new Date().toISOString()
  });

  lastAction = {
    contactId: c.id,
    action,
    index: currentIndex,
    name: ((c.first_name || '') + ' ' + (c.last_name || '')).trim()
  };

  setTimeout(() => {
    currentIndex++;
    renderCard();
    const undo = document.getElementById('undo-bar');
    document.getElementById('undo-name').textContent = ' ' + lastAction.name;
    undo.classList.add('show');
    clearTimeout(window._undoTimer);
    window._undoTimer = setTimeout(() => undo.classList.remove('show'), 5000);
  }, 300);
}

async function undoAction() {
  if (!lastAction) return;

  await db.from('onecard_review')
    .delete()
    .eq('contact_id', lastAction.contactId)
    .eq('action', lastAction.action);

  currentIndex = lastAction.index;
  lastAction = null;
  document.getElementById('undo-bar').classList.remove('show');
  renderCard();
}

init();
</script>
</body>
</html>
