<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TMG Contact Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
  touch-action: none;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #111;
}
.header h1 { font-size: 16px; font-weight: 600; }
.counter { font-size: 13px; color: #888; }

.progress-bar {
  height: 3px;
  background: #222;
}
.progress-fill {
  height: 100%;
  background: #4a9eff;
  transition: width 0.3s;
}

.card-container {
  position: relative;
  height: calc(100dvh - 39px - 3px - 70px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 8px 12px;
  overflow: hidden;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #1a1a1a;
  border-radius: 14px;
  border: 1px solid #333;
  overflow-y: auto;
  max-height: 100%;
  position: relative;
  transition: transform 0.3s ease, opacity 0.3s ease;
  touch-action: pan-y;
}
.card.swiping { transition: none; }
.card.swipe-right { transform: translateX(150%) rotate(15deg); opacity: 0; }
.card.swipe-left { transform: translateX(-150%) rotate(-15deg); opacity: 0; }
.card.swipe-up { transform: translateY(-150%); opacity: 0; }

.swipe-indicator {
  position: absolute;
  top: 12px;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  opacity: 0;
  z-index: 10;
  pointer-events: none;
}
.swipe-indicator.right { right: 12px; background: #0d5; color: #000; }
.swipe-indicator.left { left: 12px; background: #f44; color: #fff; }
.swipe-indicator.up { left: 50%; transform: translateX(-50%); background: #fa0; color: #000; }

.card-top {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #2a2a2a;
}
.card-top h2 { font-size: 20px; font-weight: 700; line-height: 1.2; }
.card-top .meta { font-size: 13px; color: #888; margin-top: 2px; }
.card-top .meta .company { color: #4a9eff; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
}
.badge.current_client { background: #0d52; color: #0d5; border: 1px solid #0d5; }
.badge.past_client { background: #fa02; color: #fa0; border: 1px solid #fa0; }
.badge.warm_lead { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }
.badge.cold_lead { background: #88888822; color: #888; border: 1px solid #555; }
.badge.referral { background: #a855f722; color: #a855f7; border: 1px solid #a855f7; }
.badge.internal { background: #66666622; color: #666; border: 1px solid #444; }
.badge.prospect { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff; }

.card-info {
  padding: 8px 16px 6px;
  border-bottom: 1px solid #2a2a2a;
}
.card-info a { color: #4a9eff; text-decoration: none; }
.info-row {
  display: flex;
  align-items: flex-start;
  padding: 3px 0;
  font-size: 13px;
}
.info-label { color: #666; width: 70px; flex-shrink: 0; }
.info-value { color: #ccc; word-break: break-all; }
.data-dots {
  font-size: 11px;
  padding: 4px 0 6px;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 4px;
}

.intel {
  padding: 10px 16px 14px;
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
}

.actions {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 16px;
  background: #111;
  border-top: 1px solid #222;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
}

.action-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid;
  background: transparent;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { transform: scale(0.9); }
.btn-remove { border-color: #f44; color: #f44; }
.btn-edit { border-color: #fa0; color: #fa0; }
.btn-confirm { border-color: #0d5; color: #0d5; }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #666;
  font-size: 16px;
}

.undo-bar {
  display: none;
  position: fixed;
  bottom: 78px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 50;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  animation: fadeIn 0.2s;
}
.undo-bar.show { display: block; }
.undo-bar span { color: #4a9eff; font-weight: 600; margin-left: 6px; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.empty-state { text-align: center; padding: 40px; }
.empty-state h2 { margin-bottom: 8px; }
.empty-state p { color: #888; }

/* Flag modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }

.modal {
  background: #1a1a1a;
  border-radius: 16px;
  border: 1px solid #333;
  width: 100%;
  max-width: 360px;
  padding: 24px 20px;
}
.modal h3 {
  font-size: 18px;
  margin-bottom: 4px;
}
.modal p {
  font-size: 14px;
  color: #888;
  margin-bottom: 16px;
}
.modal textarea {
  width: 100%;
  min-height: 100px;
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  font-size: 16px;
  padding: 12px;
  font-family: inherit;
  resize: none;
}
.modal textarea::placeholder { color: #555; }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.modal-btn.cancel { background: #333; color: #999; }
.modal-btn.submit { background: #fa0; color: #000; }
</style>
</head>
<body>

<div class="header">
  <h1>TMG Review</h1>
  <div class="counter" id="counter">Loading...</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="card-container" id="card-container">
  <div class="loading" id="loading">Loading contacts...</div>
</div>

<div class="actions">
  <button class="action-btn btn-remove" onclick="handleAction('remove')">&#10005;</button>
  <button class="action-btn btn-edit" onclick="showFlagModal()">&#9888;</button>
  <button class="action-btn btn-confirm" onclick="handleAction('confirm')">&#10003;</button>
</div>

<div class="undo-bar" id="undo-bar" onclick="undoAction()">Undo<span id="undo-name"></span></div>

<div class="modal-overlay" id="flag-modal">
  <div class="modal">
    <h3 id="modal-name"></h3>
    <p>What should we know about this contact?</p>
    <textarea id="flag-note" placeholder="Tap here and dictate what's wrong or what needs updating..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeFlagModal()">Cancel</button>
      <button class="modal-btn submit" onclick="submitFlag()">Flag It</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eacyaqvkfexqbauitczm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY3lhcXZrZmV4cWJhdWl0Y3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjgwMzYsImV4cCI6MjA4OTM0NDAzNn0.oKCyrqMi8W7_59yM7TO1NxNU7ek0YaPtNf2_gDIFpnY';

let db;
let contacts = [];
let currentIndex = 0;
let sessionStats = { confirmed: 0, removed: 0, flagged: 0 };
let lastAction = null; // { contactId, action, index }

async function init() {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadContacts();
}

async function loadContacts() {
  try {
    let allData = [];
    let from = 0;
    const batchSize = 1000;
    let hasMore = true;

    while (hasMore) {
      const { data, error } = await db
        .from('contact_intel')
        .select(`
          narrative, relationship_status, email_count, meeting_count, last_interaction,
          contacts (
            id, first_name, last_name, nickname, email, phone, mobile_phone, business_phone,
            company, employer, job_title, nominator, linkedin_url,
            client_status, client_years_active, client_last_invoiced
          )
        `)
        .not('narrative', 'is', null)
        .order('contact_id', { ascending: true })
        .range(from, from + batchSize - 1);

      if (error) {
        const el = document.getElementById('loading');
        if (el) el.textContent = 'Error: ' + error.message;
        return;
      }

      const reshaped = (data || []).map(row => {
        const c = row.contacts || {};
        c.contact_intel = {
          narrative: row.narrative,
          relationship_status: row.relationship_status,
          email_count: row.email_count,
          meeting_count: row.meeting_count,
          last_interaction: row.last_interaction
        };
        return c;
      }).filter(c => c.id);
      allData = allData.concat(reshaped);

      if (!data || data.length < batchSize) hasMore = false;
      else from += batchSize;
    }

    // Sort alphabetically by last name
    allData.sort((a, b) => {
      const la = (a.last_name || '').toLowerCase();
      const lb = (b.last_name || '').toLowerCase();
      if (la < lb) return -1;
      if (la > lb) return 1;
      const fa = (a.first_name || '').toLowerCase();
      const fb = (b.first_name || '').toLowerCase();
      return fa < fb ? -1 : fa > fb ? 1 : 0;
    });

    contacts = allData.filter(c => {
      const first = (c.first_name || '').trim();
      const last = (c.last_name || '').trim();
      if (!first && !last) return false;
      if (/^\d{7,}$/.test(last.replace(/\D/g, ''))) return false;
      return true;
    });

    renderCard();
  } catch (err) {
    const el = document.getElementById('loading');
    if (el) el.textContent = 'Error: ' + err.message;
  }
}

function renderCard() {
  const container = document.getElementById('card-container');
  const total = contacts.length;

  document.getElementById('counter').textContent =
    (currentIndex + 1) + ' / ' + total + '  (' + sessionStats.confirmed + '✓ ' + sessionStats.removed + '✗ ' + sessionStats.flagged + '⚑)';
  document.getElementById('progress').style.width = (total > 0 ? ((currentIndex / total) * 100) : 0) + '%';

  if (total === 0 || currentIndex >= total) {
    container.innerHTML = '<div class="empty-state"><h2>All done!</h2><p>No more contacts to review.</p></div>';
    return;
  }

  const c = contacts[currentIndex];
  const intel = c.contact_intel ? (Array.isArray(c.contact_intel) ? c.contact_intel[0] : c.contact_intel) : null;
  const phone = c.mobile_phone || c.phone || c.business_phone || '';
  const company = c.company || c.employer || '';

  // Badge priority: invoicing data > AI classification
  let badgeClass = '';
  let badgeText = '';
  if (c.client_status === 'current_client') {
    badgeText = 'Client' + (c.client_years_active ? ' · ' + c.client_years_active + ' yrs' : '');
    badgeClass = 'current_client';
  } else if (c.client_status === 'past_client') {
    badgeText = 'Past Client' + (c.client_last_invoiced ? ' · last ' + c.client_last_invoiced : '');
    badgeClass = 'past_client';
  } else if (intel && intel.relationship_status) {
    badgeText = intel.relationship_status.replace(/_/g, ' ');
    if (intel.relationship_status === 'active_client') badgeClass = 'current_client';
    else if (intel.relationship_status === 'warm_lead') badgeClass = 'warm_lead';
    else if (intel.relationship_status === 'cold_lead') badgeClass = 'cold_lead';
    else if (intel.relationship_status === 'referral_source') badgeClass = 'referral';
    else if (intel.relationship_status === 'internal') badgeClass = 'internal';
    else if (intel.relationship_status === 'unknown') badgeClass = 'cold_lead';
    else badgeClass = 'prospect';
  }

  // Build meta line
  let metaParts = [];
  if (company) metaParts.push('<span class="company">' + esc(company) + '</span>');
  if (c.job_title) metaParts.push(esc(c.job_title));

  // Data completeness dots
  let dots = '';
  dots += '<span style="color:' + (c.email ? '#0d5' : '#333') + '">Email</span> · ';
  dots += '<span style="color:' + (phone ? '#0d5' : '#333') + '">Phone</span> · ';
  dots += '<span style="color:' + (c.linkedin_url ? '#0d5' : '#333') + '">LinkedIn</span> · ';
  dots += '<span style="color:' + (intel && intel.narrative ? '#0d5' : '#333') + '">Intel</span>';

  // Build info rows
  let infoRows = '';
  if (c.email) infoRows += infoRow('Email', '<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>');
  if (phone) infoRows += infoRow('Phone', '<a href="tel:' + esc(phone) + '">' + esc(phone) + '</a>');
  if (c.linkedin_url) infoRows += infoRow('LinkedIn', '<a href="' + esc(c.linkedin_url) + '" target="_blank">Profile</a>');
  if (c.nominator) infoRows += infoRow('Referred', esc(c.nominator));
  if (intel && intel.last_interaction) infoRows += infoRow('Last', esc(intel.last_interaction));

  let html = `
    <div class="card" id="active-card">
      <div class="swipe-indicator right" id="ind-right">CONFIRM</div>
      <div class="swipe-indicator left" id="ind-left">REMOVE</div>
      <div class="swipe-indicator up" id="ind-up">FLAG</div>

      <div class="card-top">
        <h2>${esc(c.first_name || '')} ${esc(c.last_name || '')}</h2>
        ${metaParts.length ? '<div class="meta">' + metaParts.join(' · ') + '</div>' : ''}
        ${badgeText ? '<div class="badge ' + badgeClass + '">' + esc(badgeText) + '</div>' : ''}
      </div>

      <div class="card-info">
        <div class="data-dots">${dots}</div>
        ${infoRows}
      </div>

      <div class="intel">${intel && intel.narrative ? formatNarrative(intel.narrative) : '<span style="color:#555">No intel available</span>'}</div>
    </div>`;

  function infoRow(label, value) {
    return '<div class="info-row"><div class="info-label">' + label + '</div><div class="info-value">' + value + '</div></div>';
  }

  container.innerHTML = html;
  setupSwipeGestures();
}

function formatNarrative(text) {
  return esc(text).replace(/\n/g, '<br>');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Swipe ---
let startX, startY, isDragging = false;

function setupSwipeGestures() {
  const card = document.getElementById('active-card');
  if (!card) return;
  card.addEventListener('touchstart', onTouchStart, { passive: true });
  card.addEventListener('touchmove', onTouchMove, { passive: false });
  card.addEventListener('touchend', onTouchEnd);
  card.addEventListener('mousedown', onMouseDown);
}

function onTouchStart(e) {
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
  isDragging = true;
  const card = document.getElementById('active-card');
  if (card) card.classList.add('swiping');
}

function onTouchMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.touches[0];
  updateCardPosition(t.clientX - startX, t.clientY - startY);
}

function onTouchEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  const card = document.getElementById('active-card');
  if (!card) return;
  card.classList.remove('swiping');
  const t = e.changedTouches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;
  if (dx > 100) handleAction('confirm');
  else if (dx < -100) handleAction('remove');
  else if (dy < -100) showFlagModal();
  else { card.style.transform = ''; hideIndicators(); }
}

function onMouseDown(e) {
  startX = e.clientX;
  startY = e.clientY;
  isDragging = true;
  const card = document.getElementById('active-card');
  if (card) card.classList.add('swiping');
  const onMove = (ev) => { if (isDragging) updateCardPosition(ev.clientX - startX, ev.clientY - startY); };
  const onUp = (ev) => {
    isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const card = document.getElementById('active-card');
    if (!card) return;
    card.classList.remove('swiping');
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    if (dx > 100) handleAction('confirm');
    else if (dx < -100) handleAction('remove');
    else if (dy < -100) showFlagModal();
    else { card.style.transform = ''; hideIndicators(); }
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function updateCardPosition(dx, dy) {
  const card = document.getElementById('active-card');
  if (!card) return;
  card.style.transform = 'translateX(' + dx + 'px) translateY(' + Math.min(dy, 0) + 'px) rotate(' + (dx * 0.05) + 'deg)';
  const r = document.getElementById('ind-right');
  const l = document.getElementById('ind-left');
  const u = document.getElementById('ind-up');
  if (r) r.style.opacity = Math.max(0, Math.min(1, dx / 100));
  if (l) l.style.opacity = Math.max(0, Math.min(1, -dx / 100));
  if (u) u.style.opacity = Math.max(0, Math.min(1, -dy / 100));
}

function hideIndicators() {
  ['ind-right', 'ind-left', 'ind-up'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = 0;
  });
}

// --- Flag Modal ---
function showFlagModal() {
  const c = contacts[currentIndex];
  if (!c) return;
  document.getElementById('modal-name').textContent = (c.first_name || '') + ' ' + (c.last_name || '');
  document.getElementById('flag-note').value = '';
  document.getElementById('flag-modal').classList.add('show');
  setTimeout(() => document.getElementById('flag-note').focus(), 100);
}

function closeFlagModal() {
  document.getElementById('flag-modal').classList.remove('show');
  const card = document.getElementById('active-card');
  if (card) { card.style.transform = ''; hideIndicators(); }
}

function submitFlag() {
  const note = document.getElementById('flag-note').value;
  document.getElementById('flag-modal').classList.remove('show');
  handleAction('flag', note);
}

// --- Actions ---
async function handleAction(action, note) {
  if (currentIndex >= contacts.length) return;
  const c = contacts[currentIndex];

  const card = document.getElementById('active-card');
  if (card) {
    card.classList.remove('swiping');
    if (action === 'confirm') card.classList.add('swipe-right');
    else if (action === 'remove') card.classList.add('swipe-left');
    else card.classList.add('swipe-up');
  }

  await db.from('review_actions').insert({
    contact_id: c.id,
    action: action,
    note: note || null,
    reviewed_at: new Date().toISOString()
  });

  if (action === 'confirm') sessionStats.confirmed++;
  else if (action === 'remove') sessionStats.removed++;
  else sessionStats.flagged++;

  lastAction = { contactId: c.id, action: action, index: currentIndex, name: (c.first_name || '') + ' ' + (c.last_name || '') };

  setTimeout(() => {
    currentIndex++;
    renderCard();
    // Show undo bar
    const undo = document.getElementById('undo-bar');
    document.getElementById('undo-name').textContent = lastAction.name;
    undo.classList.add('show');
    // Auto-hide after 5 seconds
    clearTimeout(window._undoTimer);
    window._undoTimer = setTimeout(() => { undo.classList.remove('show'); }, 5000);
  }, 300);
}

async function undoAction() {
  if (!lastAction) return;

  // Delete the last review action from DB
  await db.from('review_actions')
    .delete()
    .eq('contact_id', lastAction.contactId)
    .eq('action', lastAction.action)
    .order('reviewed_at', { ascending: false })
    .limit(1);

  // Reverse the stat
  if (lastAction.action === 'confirm') sessionStats.confirmed--;
  else if (lastAction.action === 'remove') sessionStats.removed--;
  else sessionStats.flagged--;

  // Go back
  currentIndex = lastAction.index;
  lastAction = null;
  document.getElementById('undo-bar').classList.remove('show');
  renderCard();
}

init();
</script>
</body>
</html>
